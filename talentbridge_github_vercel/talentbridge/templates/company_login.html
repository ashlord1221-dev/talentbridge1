{% extends "base.html" %}
{% block title %}Company Login — TalentBridge{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:32px;">
  <div style="background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:32px;width:100%;max-width:400px;">
    <div style="text-align:center;margin-bottom:24px;">
      <div style="font-size:36px;margin-bottom:10px;">🏢</div>
      <h2 style="font-family:var(--font-h);font-size:22px;font-weight:800;">Company login</h2>
      <p class="text-muted" style="font-size:13px;margin-top:4px;">Manage your jobs and candidates.</p>
    </div>
    <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#166534;">
      Demo: <strong>google@demo.com</strong> / <strong>demo123</strong>
    </div>
    <form method="POST">
      <div class="form-group"><label class="form-label">Company email</label><input class="form-input" name="email" type="email" placeholder="hr@company.com" required/></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" name="password" type="password" placeholder="••••••••" required/></div>
      <button class="btn btn-success btn-full btn-lg" type="submit">Log in →</button>
    </form>
    <div style="text-align:center;margin-top:14px;font-size:13px;color:var(--ink3);">No account? <a href="/company/register" style="color:var(--green);">Register company</a></div>
    <div class="divider"></div>
    <div style="text-align:center;font-size:13px;color:var(--ink3);">Looking for jobs? <a href="/candidate/login" style="color:var(--accent);">Candidate login</a></div>
  </div>
</div>
{% endblock %}
